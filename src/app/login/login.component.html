<div class="parent">

    <form [formGroup]="loginForm" (ngSubmit)="login()">

        <label for="">email:</label>
        <input type="text" formControlName="email">
        <br>

        <label for="">Password:</label>
        <input type="text" formControlName="password">
        <br>

        <button type="submit">Login</button>

    </form>

</div>
