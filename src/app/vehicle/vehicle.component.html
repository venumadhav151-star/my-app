<p>vehicle works!</p>

<input type="text" name="" id="" placeholder="search" [(ngModel)]="term">
<button class="blue-button" (click)="filterVechiles()">   filter</button>
<button class="blue-button" (click)="getvechileswithparams()">search2</button>
<button class="blue-button" (click)="getvechileswithparams()">sort2</button>

<br>

<label for="">column</label>
<select [(ngModel)]="column">
    <option value="color">color</option>
    <option value="fuel">fuel</option>
    <option value="model">model</option>
</select>

<label for="">order:</label>
<select [(ngModel)]="order">
    <option value="asc">Ascending </option>
    <option value="desc">Descending</option>
</select>
<button class="blue-button" (click)="sortvechiles()">sort</button>

<table>
    <thead>
        <tr>
            <th>vehicle</th>
            <th>manufacturer</th>
            <th>model</th>
            <th>type</th>
            <th>fuel</th>
            <th>colour</th>
            <th>image</th>
            <th>cost</th>
            <th>tyres</th>
            <th>id</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let vechile of vechile">
            <td>{{vechile.vehicle}}</td>
            <td>{{vechile.manufacturer}}</td>
            <td>{{vechile.model}}</td>
            <td>{{vechile.type}}</td>
            <td>{{vechile.fuel}}</td>
            <td>{{vechile.color}}</td>
            <td>
                <img [src]="vechile.image" alt="" width="100px" height="100px">
            </td>
            <td>{{vechile.cost}}</td>
            <td>{{vechile.tyres}}</td>
            <td>{{vechile.id}}</td>
            <td>
                <button class="red-button" (click)="deleteVehicle(vechile.id)">delete</button>
            </td>

        </tr>
    </tbody>
</table>


<button class="gray-button"
(click)="pageVechicles(i+1)"
*ngFor="let page of [].constructor(10);let i=index">
{{i+1}}</button>

<hr>
<button class="green-button" (click)="getvechileswithparams(i+1)" *ngFor="let page of [].constructor(10);let i=index">

</button>
