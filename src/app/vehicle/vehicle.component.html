<p>vehicle works!</p>

<input type="text" name="" id="" placeholder="search" [(ngModel)]="term">
<button class="blue-button" (click)="filterVechiles()">   filter</button>

<br>


<table>
    <thead>
        <tr>
            <th>vehicle</th>
            <th>manufacturer</th>
            <th>model</th>
            <th>type</th>
            <th>fuel</th>
            <th>colour</th>
            <th>image</th>
            <th>cost</th>
            <th>tyres</th>
            <th>id</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let vechile of vechile">
            <td>{{vechile.vehicle}}</td>
            <td>{{vechile.manufacturer}}</td>
            <td>{{vechile.model}}</td>
            <td>{{vechile.type}}</td>
            <td>{{vechile.fuel}}</td>
            <td>{{vechile.colour}}</td>
            <td>
                <img [src]="vechile.image" alt="" width="100px" height="100px">
            </td>
            <td>{{vechile.cost}}</td>
            <td>{{vechile.tyres}}</td>
            <td>{{vechile.id}}</td>
            <td>
                <button class="red-button" (click)="deleteVehicle(vechile.id)">delete</button>
            </td>

        </tr>
    </tbody>
</table>
